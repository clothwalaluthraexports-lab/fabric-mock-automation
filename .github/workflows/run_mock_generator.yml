name: Fabric Mock Generator

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  generate-mocks:
    name: Generate Fabric Mocks
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Fabric Mock Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DRIVE_INPUT_FOLDER_ID: ${{ secrets.DRIVE_INPUT_FOLDER_ID }}
          DRIVE_OUTPUT_FOLDER_ID: ${{ secrets.DRIVE_OUTPUT_FOLDER_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          OUTPUT_FORMAT: ${{ secrets.OUTPUT_FORMAT || 'jpg' }}
          MAX_RETRIES: ${{ secrets.MAX_RETRIES || '3' }}
          DELAY_BETWEEN_DESIGNS: ${{ secrets.DELAY_BUTWEEN_DESIGNS || '5' }}
          MOVE_PROCESSED_FILES: ${{ secrets.MOVE_PROCESSED_FILES || 'true' }}
        run: python main.py
      - name: Report success
        if: success()
        run: echo "Completed successfully."
      - name: Report failure
        if: failure()
        run: echo "Encountered failures."
